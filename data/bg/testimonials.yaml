- name: "Джоан Юан"
  title: "Партньор в Turn/River Capital"
  quote: >-
    'When Grit Is Not Enough' е истински майсторски клас по изграждане на процъфтяващ
    софтуерен бизнес от нулата. Дийн Гуида споделя изпитани на практика прозрения и системи,
    разкривайки изкуството на самостоятелното изграждане с упоритост, творчество и стратегическа
    проницателност. Тази книга е съкровищница от мъдрост, предлагаща ключови моменти — от решаващи
    избори относно културата до поставянето на смели и вдъхновяващи цели, оформили траекторията на
    компанията му. За основатели и инвеститори едновременно, това е най-доброто ръководство за
    изграждане на трайно предприятие. Задължително четиво за онези, които смеят да мечтаят мащабно
    и да изграждат още по-мащабно.

- name: "Шон Елис"
  title: "Автор на 'Hacking Growth'"
  quote: >-
    Пътят на Дийн Гуида е свидетелство за силата на съчетаването на упоритост със стратегическо
    мислене. 'When Grit Is Not Enough' е практическо ръководство, изпълнено с приложими съвети.
    Задължителен ресурс за всеки бизнес лидер, стремящ се да преодолее бариерите.

- name: "Тайлър Джюъл"
  title: "Изпълнителен директор на Lightbend"
  quote: >-
    Познавам автора от почти 25 години, от времето когато стартъпът му беше в начален стадий.
    Пазарните предизвикателства, пред които е изправен Infragistics, са го принудили да се преоткрие
    почти половин дузина пъти оттогава. В епоха, в която рисковите капиталисти гонят масивен растеж
    и бързи изходи, Дийн вместо това внушава манталитета, процесите и културата, необходими за
    изграждане на вечнозелен бизнес — такъв, в който създаването на стойност е непрестанно и трайно
    независимо от пазарните условия. Дийн предлага прозрачност за начина, по който Infragistics
    прилага тези принципи. Страхотно четиво за ръководители и изпълнителни директори.

- name: "Томас Суола"
  title: "Изпълнителен директор, Dotmatics"
  quote: >-
    Дийн Гуида върши наистина забележителна работа, предоставяйки рамка за начинаещи предприемачи
    и опитни ръководители, за да повишат ефективността и прогреса в съответните им организации.
    'When Grit Is Not Enough' предлага яснота — предложенията и плановете са не само лесно смилаеми,
    но са представени с емпатия и разбиране за предизвикателствата, с които се сблъскваш в процеса
    на изграждане на компания. Горещо препоръчвам тази книга на всеки предприемач или бизнес
    оператор, търсещ насоки как да повиши своята ефективност и да постигне значими, осезаеми
    резултати.

- name: "Фой Кули"
  title: "Изпълнителен директор на Access Self Storage"
  quote: >-
    Тази книга е фантастична! Каква детайлна, ясна и изчерпателна пътна карта за добри практики
    във всеки аспект на управлението на компания. Чудесна е както за изпълнителното ниво, така и
    за мениджърите на екипи. Прочел съм стотици бизнес книги през последните четиридесет години.
    Никога не съм чел такава, която да е толкова ясна и изчерпателна!

- name: "Сам Рийс"
  title: "Изпълнителен директор, Vistage Worldwide"
  quote: >-
    Един от трайните уроци, научени от изпълнителните директори през последните години, е, че в
    бизнеса винаги ще има неизвестни. Независимо дали е изкуствен интелект, инфлация или глобален
    конфликт, готовността за неочаквани проблеми може да направи или съсипе една компания. Книгата
    на Дийн Гуида е ръководство с практически информация за всеки бизнес лидер/предприемач за
    справяне с комплексността на бизнес света.
