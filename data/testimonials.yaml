- name: "Joanne Yuan"
  title: "Partner at Turn/River Capital"
  quote: "'When Grit Is Not Enough' is a masterclass in building a thriving software business from the ground up. Dean Guida shares battle-tested insights and systems, revealing the art of bootstrapping with tenacity, creativity, and strategic acumen. This book is a treasure trove of wisdom, offering pivotal moments, from crucial decisions on culture to setting big hairy audacious goals, that shaped his company's trajectory. For founders and investors alike, this is the ultimate guide to building an enduring business. A must-read for those who dare to dream big and build bigger."

- name: "Sean Ellis"
  title: "Author of Hacking Growth"
  quote: "Dean Guida's journey is a testament to the power of combining grit with strategic thinking. 'When Grit is Not Enough' is a practical guide filled with actionable advice. It's a must-have resource for any business leader looking to break through barriers."

- name: "Tyler Jewell"
  title: "CEO of Lightbend"
  quote: "I've known the author for nearly 25 years, at a time when his startup was in its infancy. The market challenges that Infragistics has faced caused them to reinvent nearly a half dozen times since. In this age where VCs chase massive growth and quick exits, Dean instead instills the mindset, processes, and culture needed to build an evergreen business – one where value creation is continual and enduring regardless of the market's conditions. Dean offers transparency into how Infragistics applies these principles and executes their cadence around culture, strategy, and execution by sharing their current year plans and how the planning cycle is managed. Great read for executives and CEOs alike."

- name: "Thomas Swalla"
  title: "CEO, Dotmatics"
  quote: "Dean Guida does a truly remarkable job of providing a framework for both aspiring entrepreneurs and seasoned executives to drive increased performance and progress across through their respective organizations. 'When Grit is Not Enough' provides clarity of the suggestions and blueprints are not only easily digestible, but are provided with empathy and understanding of the challenges one faces during the company building process. I would highly recommend this book to any entrepreneur or business operator looking for guidance on how to level up their performance and drive significant tangible results."

- name: "Foy Cooley"
  title: "CEO of Access Self Storage"
  quote: "This book is fantastic! What a detailed, clear, and thorough road map for best practices in every aspect of running a company. Great for both the C-suite and also managers of teams. I've read hundreds of business books over the last forty years. Never read one as clear and thorough as this one!"

- name: "Sam Reese"
  title: "CEO, Vistage Worldwide"
  quote: "One of the lasting lessons CEOs have learned over the past few years is that there will always be unknowns when it comes to business. Whether it is artificial intelligence, inflation, or global conflict, being prepared for unexpected issues can make or break a company. Dean Guida's book is a guide with actionable information for every business leader/entrepreneur to deal with the complexities of the business world."
