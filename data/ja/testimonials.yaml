- name: "ジョアン・ユアン"
  title: "Turn/River Capital パートナー"
  quote: "『When Grit Is Not Enough』は、ゼロからソフトウェアビジネスを構築するためのマスタークラスです。ディーン・グイダは実戦で培ったインサイトとシステムを惜しみなく共有し、粘り強さ・創造性・戦略的な知性でブートストラップする技術を明かします。カルチャーに関する重要な決断からBHAG（大きく毛深く大胆な目標）の設定まで、会社の軌跡を形作った数々の重要な瞬間が詰まった知恵の宝庫です。創業者にも投資家にも、永続するビジネスを構築するための究極のガイドです。大きく夢を見て、さらに大きく構築しようとする方への必読書です。"

- name: "ショーン・エリス"
  title: "『Hacking Growth』著者"
  quote: "ディーン・グイダの歩みは、グリットと戦略的思考を融合させる力の証です。『When Grit is Not Enough』は実用的なアドバイスに満ちた実践的なガイドです。壁を突き破ろうとするすべてのビジネスリーダーにとって必携の一冊です。"

- name: "タイラー・ジュエル"
  title: "Lightbend CEO"
  quote: "私は著者をほぼ25年間知っており、スタートアップが黎明期にあった頃からの付き合いです。Infragisticsが直面した市場の課題は、それ以来約6回の事業再構築を余儀なくされてきました。VCが大きな成長と素早い出口を追い求めるこの時代に、ディーンは代わりに、常緑のビジネスを構築するために必要なマインドセット・プロセス・文化を植え付けます。市場の状況に関わらず、価値の創造が継続・持続するビジネスです。経営幹部とCEOにとって非常に価値ある一冊です。"

- name: "トーマス・スワラ"
  title: "Dotmatics CEO"
  quote: "ディーン・グイダは、野心的な起業家から経験豊富な経営者まで、組織全体でパフォーマンスと進歩を高めるためのフレームワークを見事に提供しています。提示される示唆と設計図は消化しやすいだけでなく、会社構築過程での課題に対する共感と理解とともに届けられます。パフォーマンスを向上させ、目に見える成果を生み出すための指導を求める起業家やビジネスオペレーターすべてに強くお勧めします。"

- name: "フォイ・クーリー"
  title: "Access Self Storage CEO"
  quote: "この本は素晴らしい！会社経営のあらゆる側面におけるベストプラクティスのための、詳細で明確かつ徹底したロードマップです。C-suiteにも、チームのマネージャーにも最適です。過去40年間に数百冊のビジネス書を読んできましたが、これほど明確で徹底した一冊は読んだことがありません！"

- name: "サム・リース"
  title: "Vistage Worldwide CEO"
  quote: "過去数年間でCEOが学んだ持続的な教訓の一つは、ビジネスには常に未知の要素があるということです。人工知能であれ、インフレであれ、グローバルな紛争であれ、予期しない問題への備えが企業の成否を左右します。ディーン・グイダの本は、あらゆるビジネスリーダー・起業家がビジネスの複雑さに対処するための実行可能な情報を備えたガイドです。"
