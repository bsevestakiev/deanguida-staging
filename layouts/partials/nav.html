<header class="site-header" id="site-header">
  <div class="container nav-container">
    <a href="/" class="logo-link">
      <img src="/images/logo.svg" alt="Dean Guida Logo" class="site-logo" />
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <ul>
        <li><a href="#book">{{ i18n "nav_book" }}</a></li>
        <li><a href="#praise">{{ i18n "nav_praise" }}</a></li>
        <li><a href="#author">{{ i18n "nav_author" }}</a></li>
        <li><a href="#media">{{ i18n "nav_media" }}</a></li>
        <li><a href="{{ .Site.Params.podcastURL }}" target="_blank" rel="noopener">{{ i18n "nav_podcast" }}</a></li>
        <li><a href="#contact">{{ i18n "nav_contact" }}</a></li>
        {{ range .Translations }}
        <li class="lang-switch"><a href="{{ .RelPermalink }}">{{ .Language.LanguageName }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
