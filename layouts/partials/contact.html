<section class="contact-section bg-gradient-animated" id="contact">
  <div class="container contact-container">
    <h2>{{ .Params.contact.heading }}</h2>
    <form class="contact-form" action="{{ .Site.Params.contactFormAction }}" method="POST">
      <input type="hidden" name="_subject" value="Contact from deanguida.com" />
      <div class="form-row">
        <div class="form-group half">
          <label for="first-name">{{ i18n "label_first_name" }} <span class="required">*</span></label>
          <input type="text" id="first-name" name="first_name" required />
        </div>
        <div class="form-group half">
          <label for="last-name">{{ i18n "label_last_name" }} <span class="required">*</span></label>
          <input type="text" id="last-name" name="last_name" required />
        </div>
      </div>
      <div class="form-group">
        <label for="contact-email">{{ i18n "label_email" }} <span class="required">*</span></label>
        <input type="email" id="contact-email" name="email" required />
      </div>
      <div class="form-group">
        <label for="phone">{{ i18n "label_phone" }}</label>
        <input type="tel" id="phone" name="phone" />
      </div>
      <div class="form-group">
        <label for="comments">{{ i18n "label_comments" }} <span class="required">*</span></label>
        <textarea id="comments" name="comments" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">{{ i18n "btn_submit" }}</button>
    </form>
  </div>
</section>
