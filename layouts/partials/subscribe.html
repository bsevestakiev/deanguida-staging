<section class="subscribe-section bg-gradient-animated">
  <div class="container subscribe-container">
    <h2>{{ .Params.subscribe.heading }}</h2>
    <p>{{ .Params.subscribe.subtext | markdownify }}</p>
    <form class="subscribe-form" action="{{ .Site.Params.mailchimpURL }}" method="POST" target="_blank">
      <div class="form-group">
        <label for="subscribe-email">Email <span class="required">*</span></label>
        <input type="email" id="subscribe-email" name="EMAIL" required placeholder="your@email.com" />
      </div>
      <button type="submit" class="btn btn-yellow">Subscribe</button>
    </form>
  </div>
</section>
